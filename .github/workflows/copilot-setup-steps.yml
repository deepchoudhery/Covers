name: "Copilot Setup Steps"
on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
jobs:
  copilot-setup-steps:
    runs-on: windows-latest
    steps:
      - uses: deepchoudhery/modernize-dotnet-cca-actions@main
        with:
          dotnet-version: '10.0.x'
          install-framework-targeting-packs: 'true'